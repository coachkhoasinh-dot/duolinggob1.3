<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duolingo Style Speaking B1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f7f7f7;
            touch-action: pan-y; /* Cho phép cuộn trên mobile, chống zoom */
        }
        
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            position: relative;
            overflow-x: hidden;
        }

        /* Nút bấm 3D phong cách Duolingo */
        .btn-3d {
            transition: all 0.1s;
            border-bottom-width: 4px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        
        .btn-3d:active {
            border-bottom-width: 0px;
            transform: translateY(4px);
            margin-bottom: 4px; /* Bù đắp không gian bị mất khi viền thu nhỏ */
        }

        .btn-green {
            background-color: #58cc02;
            border-color: #58a700;
            color: white;
        }
        
        .btn-blue {
            background-color: #1cb0f6;
            border-color: #1899d6;
            color: white;
        }

        /* Nút bài học trên bản đồ */
        .lesson-node {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            border-bottom-width: 6px;
            cursor: pointer;
            transition: all 0.1s;
            position: relative;
            z-index: 10;
        }
        
        .lesson-node:active {
            border-bottom-width: 0px;
            transform: translateY(6px);
        }

        /* Các màu bài học */
        .node-color-1 { background-color: #58cc02; border-color: #58a700; color: white; }
        .node-color-2 { background-color: #ce82ff; border-color: #a568cc; color: white; }
        .node-color-3 { background-color: #1cb0f6; border-color: #1899d6; color: white; }
        .node-color-4 { background-color: #ff4b4b; border-color: #cc3c3c; color: white; }
        .node-color-5 { background-color: #ffc800; border-color: #cc9c00; color: white; }

        .node-completed::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            bottom: -5px;
            right: -5px;
            background-color: #ffc800;
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Hiệu ứng mượt cho từ vựng */
        .word-span {
            transition: background-color 0.1s, transform 0.1s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake {
            animation: shake 0.3s ease-in-out;
        }

        /* Ẩn thanh cuộn nhưng vẫn cuộn được */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="app-container flex flex-col">
        
        <!-- Header -->

        </div>

                </button>
                <div class="flex-grow mx-4 h-4 bg-gray-200 rounded-full overflow-hidden">
                    <div class="h-full bg-[#58cc02] w-1/2 rounded-full"></div>
                </div>

                <div id="view-learn" class="flex flex-col h-full">

                    <!-- Gợi ý / Câu hỏi -->

                    <div class="flex items-start w-full">
                        <!-- Nhân vật cú Duolingo (mô phỏng) -->
                        <div class="w-16 h-16 bg-[#58cc02] rounded-full flex items-center justify-center flex-shrink-0 border-b-4 border-[#58a700] mr-3 mt-4">
                            <i class="fa-solid fa-kiwi-bird text-white text-3xl"></i>
                        </div>
                        
                        <!-- Khung hội thoại -->
                        <div class="bg-white border-2 border-gray-200 rounded-2xl p-4 relative flex-grow shadow-sm">
                            <!-- Tam giác chỉ vào cú -->

                            <div class="text-xs text-[#1cb0f6] font-bold mb-3 flex items-center bg-blue-50 w-fit px-2 py-1 rounded-lg">
                                <i class="fa-solid fa-hand-pointer mr-2 animate-bounce"></i> Chạm vào từ bất kỳ để nghe
                            </div>
                            
                            <div id="lesson-english" class="text-xl leading-relaxed text-gray-800 font-bold mb-4 flex flex-wrap gap-x-1 gap-y-1">
                                <!-- Render english text with spans -->
                            </div>

                            <!-- Buttons for Audio -->
                            <div class="flex space-x-3 mt-4 pt-4 border-t-2 border-gray-100">
                                <button onclick="speakFull()" class="w-12 h-12 rounded-full bg-[#1cb0f6] text-white flex items-center justify-center text-xl btn-3d shadow-sm hover:brightness-110 active:border-b-0 active:translate-y-[4px]">
                                    <i class="fa-solid fa-volume-high"></i>
                                </button>
                                <button onclick="toggleTranslation()" class="flex-grow rounded-2xl bg-gray-100 text-gray-500 font-bold uppercase tracking-wide btn-3d border-b-4 border-gray-300 flex items-center justify-center text-sm hover:bg-gray-200">
                                    <i class="fa-solid fa-language mr-2 text-lg"></i> Dịch nghĩa
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Dịch tiếng Việt (ẩn/hiện) -->
                <div id="lesson-vietnamese" class="mt-6 p-4 bg-blue-50 rounded-2xl text-blue-800 font-semibold text-lg hidden border-2 border-blue-100">
                    <!-- Bản dịch -->
                </div>
                </div> <!-- End VIEW 1 -->

                <!-- VIEW 2: LUYỆN TẬP CÂU -->
                <div id="view-practice" class="hidden flex-col h-full">
                    <!-- Header của phần luyện tập -->
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-gray-500 font-bold text-sm uppercase" id="practice-progress-text">Câu 1/5</span>

                        </div>
                    </div>
                    
                    <h3 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                        <i class="fa-solid fa-pen-to-square text-[#1cb0f6] mr-2"></i> Sắp xếp thành câu đúng:
                    </h3>
                    
                    <!-- Khung chứa từ được chọn -->
                    <div id="practice-answer-box" class="min-h-[80px] border-b-4 border-gray-200 mb-8 flex flex-wrap gap-2 pb-3 content-start">
                        <!-- Các từ đã chọn sẽ nằm ở đây -->
                    </div>

                    <!-- Khung chứa từ để chọn -->
                    <div id="practice-word-bank" class="flex flex-wrap gap-3 justify-center mt-auto mb-4">
                        <!-- Các từ ngẫu nhiên sẽ nằm ở đây -->
                    </div>
                    
                    <!-- Thông báo đúng/sai -->
                    <div id="practice-feedback" class="hidden rounded-xl p-4 mt-auto mb-4 font-bold text-lg text-center transition-all">
                        Tuyệt vời! <i class="fa-solid fa-check-circle"></i>
                    </div>
                    
                    <!-- Nút Check Luyện Tập -->

                            KIỂM TRA
                        </button>
                    </div>
                </div> <!-- End VIEW 2 -->

            </div>

            <!-- Modal Footer (Chỉ hiện ở View Đọc & Nghe) -->
            <div id="footer-learn" class="p-4 border-t-2 border-gray-200 bg-white sticky bottom-0 shrink-0">
                <button onclick="completeLesson()" class="w-full py-4 rounded-2xl text-lg btn-3d btn-green flex items-center justify-center shadow-sm">
                    HOÀN THÀNH BÀI HỌC <i class="fa-solid fa-check ml-2"></i>
                </button>
            </div>
        </div>
    </div>

                prompts: ["Describe an event that was important to you."],
                english: "My birthday was an important event for me. It happened last year. I celebrated it with my family and friends. It was important because I had a great time with the people I love. I felt very happy and received many nice wishes and gifts.",
                vietnamese: "Sinh nhật của tôi là một sự kiện quan trọng đối với tôi. Nó diễn ra vào năm ngoái. Tôi đã tổ chức cùng gia đình và bạn bè. Nó quan trọng vì tôi đã có khoảng thời gian tuyệt vời bên những người tôi yêu quý. Tôi cảm thấy rất vui và nhận được nhiều lời chúc cùng quà tặng ý nghĩa."
            }
        ];

        let currentLessonObj = null;
        const synth = window.speechSynthesis;

        // --- CÁC BIẾN CHO TÍNH NĂNG LUYỆN CÂU ---
        let practiceSentences = [];
        let currentPracticeIndex = 0;
        let originalWords = [];
        let shuffledBank = [];
        let userAnswerBank = [];

        // Chuyển đổi giữa Tab Đọc và Tab Luyện Tập
        function switchTab(tab) {
            synth.cancel(); // Dừng đọc
            const btnLearn = document.getElementById('tab-learn');
            const btnPractice = document.getElementById('tab-practice');
            const viewLearn = document.getElementById('view-learn');
            const viewPractice = document.getElementById('view-practice');
            const footerLearn = document.getElementById('footer-learn');

            if (tab === 'learn') {
                btnLearn.className = "flex-1 py-3 font-bold text-center border-b-4 border-[#1cb0f6] text-[#1cb0f6] text-sm uppercase tracking-wide transition-all";
                btnPractice.className = "flex-1 py-3 font-bold text-center border-b-4 border-transparent text-gray-400 hover:text-gray-600 text-sm uppercase tracking-wide transition-all";
                viewLearn.classList.remove('hidden');
                viewLearn.classList.add('flex');
                viewPractice.classList.add('hidden');
                viewPractice.classList.remove('flex');
                footerLearn.classList.remove('hidden');
            } else {
                btnPractice.className = "flex-1 py-3 font-bold text-center border-b-4 border-[#1cb0f6] text-[#1cb0f6] text-sm uppercase tracking-wide transition-all";
                btnLearn.className = "flex-1 py-3 font-bold text-center border-b-4 border-transparent text-gray-400 hover:text-gray-600 text-sm uppercase tracking-wide transition-all";
                viewPractice.classList.remove('hidden');
                viewPractice.classList.add('flex');
                viewLearn.classList.add('hidden');
                viewLearn.classList.remove('flex');
                footerLearn.classList.add('hidden');
                initPractice();
            }
        }

        // Khởi tạo dữ liệu câu hỏi từ đoạn văn
        function initPractice() {
            if (!currentLessonObj) return;
            
            // Tách đoạn văn thành các câu dựa vào dấu câu
            let rawSentences = currentLessonObj.english.match(/[^.?!]+[.?!]+/g);
            if (!rawSentences) {
                rawSentences = [currentLessonObj.english];
            }
            
            // Lọc các câu có ý nghĩa (dài hơn 3 từ)
            practiceSentences = rawSentences.map(s => s.trim()).filter(s => s.split(' ').length > 3);
            if (practiceSentences.length === 0) practiceSentences = [currentLessonObj.english];
            
            currentPracticeIndex = 0;
            loadPracticeSentence();
        }

        function loadPracticeSentence() {
            // Nếu làm xong hết các câu
            if (currentPracticeIndex >= practiceSentences.length) {
                document.getElementById('practice-word-bank').innerHTML = '';
                document.getElementById('practice-answer-box').innerHTML = '<div class="w-full text-center text-[#58cc02] font-black text-2xl mt-4 animate-bounce">Bạn đã luyện tập xong! 🎉</div>';
                
                const btnCheck = document.getElementById('btn-check-practice');
                btnCheck.innerText = 'TRỞ VỀ BÀI HỌC';
                btnCheck.className = "w-full py-4 rounded-2xl text-lg font-bold btn-3d btn-green flex items-center justify-center transition-all pointer-events-auto mt-auto";
                btnCheck.onclick = () => switchTab('learn');
                
                document.getElementById('practice-feedback').classList.add('hidden');
                document.getElementById('practice-progress-bar').style.width = '100%';
                document.getElementById('practice-progress-text').innerText = 'Hoàn thành';
                return;
            }

            const sentence = practiceSentences[currentPracticeIndex];
            
            // Tách từ và loại bỏ dấu câu dính kèm
            originalWords = sentence.split(/\s+/).map(w => w.replace(/[.,!?;:()"]/g, '')).filter(w => w.length > 0);
            
            userAnswerBank = [];
            // Trộn từ ngẫu nhiên
            shuffledBank = [...originalWords].sort(() => Math.random() - 0.5);

            // Cập nhật UI thanh tiến trình
            document.getElementById('practice-progress-text').innerText = `Câu ${currentPracticeIndex + 1}/${practiceSentences.length}`;
            document.getElementById('practice-progress-bar').style.width = `${(currentPracticeIndex / practiceSentences.length) * 100}%`;
            document.getElementById('practice-feedback').classList.add('hidden');
            
            const btnCheck = document.getElementById('btn-check-practice');
            btnCheck.innerText = 'KIỂM TRA';
            btnCheck.onclick = checkPracticeSentence;

            renderPracticeUI();
        }

        function renderPracticeUI() {
            const answerBox = document.getElementById('practice-answer-box');
            const wordBank = document.getElementById('practice-word-bank');

            // Render khu vực câu trả lời (các từ đã chọn)
            answerBox.innerHTML = userAnswerBank.map((wordObj, idx) => `
                <div onclick="removePracticeWord(${idx})" class="px-4 py-2 bg-white border-2 border-gray-300 rounded-xl font-bold text-gray-700 cursor-pointer shadow-sm hover:bg-gray-50 active:scale-95 transition-transform">
                    ${wordObj.word}
                </div>
            `).join('');

            // Render kho từ vựng trộn xộn
            wordBank.innerHTML = shuffledBank.map((word, idx) => {
                if (word === null) {
                    return `<div class="px-4 py-2 bg-gray-100 border-2 border-transparent rounded-xl text-transparent">_</div>`;
                }
                return `
                    <div onclick="addPracticeWord(${idx})" class="px-4 py-2 bg-white border-2 border-gray-300 rounded-xl font-bold text-gray-700 cursor-pointer shadow-sm btn-3d active:translate-y-1 active:border-b-0 border-b-4 hover:bg-gray-50 pb-[6px]">
                        ${word}
                    </div>
                `;
            }).join('');

            // Bật/tắt nút kiểm tra
            const btnCheck = document.getElementById('btn-check-practice');
            if (userAnswerBank.length === originalWords.length && originalWords.length > 0) {
                btnCheck.className = "w-full py-4 rounded-2xl text-lg font-bold btn-3d btn-green flex items-center justify-center shadow-sm transition-all pointer-events-auto mt-auto";
            } else {
                btnCheck.className = "w-full py-4 rounded-2xl text-lg font-bold btn-3d bg-gray-200 text-gray-400 border-b-4 border-gray-300 flex items-center justify-center transition-all pointer-events-none mt-auto";
            }
        }

        function addPracticeWord(idx) {
            const word = shuffledBank[idx];
            if (word === null) return;
            
            // Đẩy vào mảng chọn
            userAnswerBank.push({ word: word, originalIdx: idx });
            // Xóa ở kho từ
            shuffledBank[idx] = null;
            
            renderPracticeUI();
            speakWord(word); // Đọc từ khi bấm
        }

        function removePracticeWord(idx) {
            const wordObj = userAnswerBank[idx];
            // Trả về kho từ
            shuffledBank[wordObj.originalIdx] = wordObj.word;
            // Xóa khỏi mảng chọn
            userAnswerBank.splice(idx, 1);
            renderPracticeUI();
        }

        function checkPracticeSentence() {
            const btnCheck = document.getElementById('btn-check-practice');
            
            // Nếu đang ở trạng thái chuyển câu
            if (btnCheck.innerText === 'TIẾP TỤC') {
                currentPracticeIndex++;
                loadPracticeSentence();
                return;
            }

            // Kiểm tra đáp án (bỏ qua viết hoa viết thường)
            const userSentence = userAnswerBank.map(w => w.word).join(' ').toLowerCase();
            const correctSentence = originalWords.join(' ').toLowerCase();
            
            const feedback = document.getElementById('practice-feedback');
            feedback.classList.remove('hidden');

            if (userSentence === correctSentence) {
                // Trả lời ĐÚNG
                feedback.className = "rounded-xl p-4 mt-auto mb-4 font-bold text-lg text-center bg-[#d7ffb8] text-[#58a700] border-2 border-[#58cc02]";
                feedback.innerHTML = 'Tuyệt vời! Chính xác! <i class="fa-solid fa-circle-check ml-1 text-xl"></i>';
                
                btnCheck.innerText = 'TIẾP TỤC';
                btnCheck.className = "w-full py-4 rounded-2xl text-lg font-bold btn-3d btn-blue flex items-center justify-center shadow-sm pointer-events-auto mt-auto";
                
                // Đọc lại cả câu đúng
                const utter = new SpeechSynthesisUtterance(originalWords.join(' '));
                setupVoice(utter, 0.9);
                synth.speak(utter);
            } else {
                // Trả lời SAI
                feedback.className = "rounded-xl p-4 mt-auto mb-4 font-bold text-lg text-center bg-[#ffdfe0] text-[#ea2b2b] border-2 border-[#ff4b4b] animate-shake";
                feedback.innerHTML = 'Chưa đúng, hãy sắp xếp lại! <i class="fa-solid fa-circle-xmark ml-1 text-xl"></i>';
                
                const box = document.getElementById('practice-answer-box');
                box.classList.add('animate-shake');
                setTimeout(() => box.classList.remove('animate-shake'), 300);

                // Trả lại toàn bộ từ
                userAnswerBank.forEach(w => {
                    shuffledBank[w.originalIdx] = w.word;
                });
                userAnswerBank = [];
                renderPracticeUI();
            }
        }

        // Khởi tạo Map
        function renderMap() {
            const container = document.getElementById('map-container');
            container.innerHTML = '';
            
            // Lấy tiến trình đã lưu
            const completedLessons = JSON.parse(localStorage.getItem('b1Completed')) || [];
            
            // Để tạo hiệu ứng đường đi ngoằn ngoèo (zigzag)
            const margins = ['ml-0', 'ml-12', 'ml-24', 'ml-12']; 

            lessonsData.forEach((lesson, index) => {
                const isCompleted = completedLessons.includes(lesson.id);
                const marginClass = margins[index % 4];
                
                // Vùng chứa node để căn giữa + lệch
                const nodeWrapper = document.createElement('div');
                nodeWrapper.className = `flex justify-center mb-8 w-full ${marginClass}`;
                
                // Tạo Node
                const btn = document.createElement('div');
                // TẤT CẢ ĐỀU ĐƯỢC MỞ KHÓA (không kiểm tra khóa)
                btn.className = `lesson-node ${lesson.colorClass} ${isCompleted ? 'node-completed' : ''} shadow-md`;
                btn.innerHTML = `<i class="fa-solid ${lesson.icon}"></i>`;
                btn.onclick = () => openLesson(lesson.id);

                // Thêm một chút mô tả nhỏ bên dưới nút
                const label = document.createElement('div');
                label.className = "absolute -bottom-6 whitespace-nowrap text-[13px] font-bold text-gray-500";
                label.innerText = `Bài ${lesson.id}`;

                btn.appendChild(label);
                nodeWrapper.appendChild(btn);
                container.appendChild(nodeWrapper);
            });
            
            // Cập nhật streak (giả lập)
            document.getElementById('streak-count').innerText = completedLessons.length;
        }

        function openLesson(id) {
            currentLessonObj = lessonsData.find(l => l.id === id);
            if(!currentLessonObj) return;

            // Đổ dữ liệu
            document.getElementById('lesson-title').innerText = currentLessonObj.title;
            
            const promptsHtml = currentLessonObj.prompts.map(p => `<li>• ${p}</li>`).join('');
            document.getElementById('lesson-prompts').innerHTML = `<ul class="list-none">${promptsHtml}</ul>`;
            
            // Xử lý Text-to-speech kiểu Cambridge: Tách từng từ, giữ nguyên dấu câu để hiển thị nhưng bắt sự kiện click
            const words = currentLessonObj.english.split(/(\s+)/); // Tách giữ lại khoảng trắng để format đẹp
            let formattedHtml = '';
            
            words.forEach(wordToken => {
                if(wordToken.trim() === '') {
                    formattedHtml += wordToken; // Giữ khoảng trắng
                } else {
                    // Tạo span cho mỗi từ. Hover: đổi màu. Active: nhún 3D.
                    formattedHtml += `<span onclick="speakWord('${wordToken.replace(/'/g, "\\'")}')" 
                                        class="cursor-pointer word-span hover:bg-blue-100 hover:text-blue-600 active:bg-blue-300 active:scale-110 active:-translate-y-1 inline-block rounded px-[2px]">${wordToken}</span>`;
                }
            });

            document.getElementById('lesson-english').innerHTML = formattedHtml;
            document.getElementById('lesson-vietnamese').innerHTML = currentLessonObj.vietnamese;
            document.getElementById('lesson-vietnamese').classList.add('hidden'); // Mặc định ẩn dịch

            // Reset Tab về Đọc & Nghe
            switchTab('learn');

            // Hiển thị modal với animation trượt lên
            const modal = document.getElementById('lesson-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('translate-y-full');
            }, 10);
        }

        function closeLesson() {
            synth.cancel(); // Dừng đọc
            const modal = document.getElementById('lesson-modal');
            modal.classList.add('translate-y-full');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function toggleTranslation() {
            const viDiv = document.getElementById('lesson-vietnamese');
            viDiv.classList.toggle('hidden');
        }

        // Đọc từng từ (Kiểu Cambridge)
        function speakWord(rawWord) {
            synth.cancel(); // Dừng mọi thứ đang đọc
            
            // Loại bỏ dấu câu đính kèm (dấu phẩy, chấm, hỏi...) để đọc cho chuẩn
            const cleanWord = rawWord.replace(/[.,!?;:()]/g, '').trim();
            if(!cleanWord) return;

            const utter = new SpeechSynthesisUtterance(cleanWord);
            setupVoice(utter, 0.8); // Đọc chậm một chút để nghe rõ phát âm
            synth.speak(utter);
        }

        // Đọc cả bài
        function speakFull() {
            synth.cancel();
            if(!currentLessonObj) return;
            const utter = new SpeechSynthesisUtterance(currentLessonObj.english);
            setupVoice(utter, 0.95); // Đọc tốc độ bình thường
            synth.speak(utter);
        }

        // Cài đặt giọng đọc ưu tiên Tiếng Anh
        function setupVoice(utterance, rate) {
            utterance.rate = rate;
            utterance.pitch = 1.0;
            const voices = synth.getVoices();
            // Cố gắng tìm giọng US hoặc UK
            const engVoice = voices.find(v => v.lang === 'en-US' || v.lang === 'en-GB') 
                          || voices.find(v => v.lang.startsWith('en'));
            if(engVoice) utterance.voice = engVoice;
        }

        function completeLesson() {
            synth.cancel();
            
            // Lưu tiến trình
            let completed = JSON.parse(localStorage.getItem('b1Completed')) || [];
            if(!completed.includes(currentLessonObj.id)) {
                completed.push(currentLessonObj.id);
                localStorage.setItem('b1Completed', JSON.stringify(completed));
            }
            
            closeLesson();
            // Đợi tắt modal rồi render lại map
            setTimeout(() => {
                renderMap();
                // Scroll tới vị trí hiện tại (tuỳ chọn)
            }, 300);
        }

        // Cần thiết để load voice trên một số trình duyệt (đặc biệt Chrome/Safari)
        speechSynthesis.onvoiceschanged = () => {
            // Giọng đọc đã sẵn sàng
        };

        // Khởi động
        window.onload = renderMap;
    </script>
</body>
</html>
