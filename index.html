<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duolingo Style Speaking B1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f7f7f7;
            touch-action: pan-y; /* Cho phép cuộn trên mobile, chống zoom */
            margin: 0;
            overflow: hidden; /* Khóa cuộn trang web ngoài cùng */
        }
        
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background-color: #ffffff;
            height: 100dvh; /* Tối ưu cho Mobile: Tự chỉnh theo thanh công cụ trình duyệt */
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Nút bấm 3D phong cách Duolingo */
        .btn-3d {
            border-bottom-width: 4px;
            border-bottom-color: rgba(0, 0, 0, 0.2);
            transition: all 0.1s;
        }
        .btn-3d:active {
            transform: translateY(4px);
            border-bottom-width: 0px;
            margin-bottom: 4px; /* Giữ layout không bị giật khi nút lún xuống */
        }

        .lesson-node {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            color: white;
            cursor: pointer;
            border-bottom: 6px solid rgba(0,0,0,0.2);
            position: relative;
            transition: all 0.1s;
        }

        .lesson-node:active {
            transform: translateY(6px);
            border-bottom-width: 0px;
        }

        .node-completed::after {
            content: '\f00c'; /* Dấu check FontAwesome */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            bottom: -5px;
            right: -5px;
            background-color: #ffc800;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid white;
        }

        /* Ẩn thanh cuộn nhưng vẫn cuộn được */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="app-container">
        
        <!-- Header -->
        <header class="bg-white z-50 px-4 py-3 sm:py-4 border-b-2 border-gray-200 flex justify-between items-center shrink-0">
            <div class="flex items-center text-gray-400 font-bold text-lg sm:text-xl">
                <i class="fa-solid fa-flag text-[#58cc02] mr-2"></i> B1.3
            </div>
            <div class="flex items-center space-x-4">
                <div class="flex items-center text-[#ff9600] font-bold">
                    <i class="fa-solid fa-fire mr-1 text-xl"></i> 1
                </div>
                <div class="flex items-center text-[#ff4b4b] font-bold">
                    <i class="fa-solid fa-heart mr-1 text-xl"></i> 5
                </div>
            </div>
        </header>

        <!-- Bản đồ bài học (Map) -->
        <div class="flex-grow overflow-y-auto pb-24 pt-8 px-4 bg-[#f7f7f7] relative" id="map-container">
            <!-- Nội dung map sẽ được render bằng JS -->
        </div>

        <!-- Modal Bài học (Khởi đầu bị ẩn) -->

                    <i class="fa-solid fa-xmark"></i>
                </button>
                
                <!-- Tabs Chuyển đổi tính năng -->
                <div class="flex bg-gray-100 p-1 rounded-xl">
                    <button onclick="switchTab('learn')" id="tab-learn" class="px-4 py-1.5 rounded-lg font-bold text-sm sm:text-base bg-white shadow text-[#1cb0f6] transition-colors">ĐỌC & NGHE</button>
                    <button onclick="switchTab('practice')" id="tab-practice" class="px-4 py-1.5 rounded-lg font-bold text-sm sm:text-base text-gray-400 hover:text-gray-600 transition-colors">LUYỆN CÂU</button>
                </div>
                
                <div class="w-8"></div> <!-- Spacer -->
            </div>

            <!-- Scrollable Body của Modal -->

                <!-- VIEW 1: ĐỌC & NGHE -->

                            <i class="fa-solid fa-kiwi-bird text-white text-2xl sm:text-3xl"></i>
                        </div>
                        
                        <!-- Khung hội thoại -->
                        <div class="bg-white border-2 border-gray-200 rounded-xl sm:rounded-2xl p-3 sm:p-4 relative flex-grow shadow-sm">
                            <!-- Tam giác chỉ vào cú -->
                            <div class="absolute w-3 h-3 sm:w-4 sm:h-4 bg-white border-l-2 border-b-2 border-gray-200 transform -rotate-45 -left-[7px] sm:-left-[10px] top-6 sm:top-8"></div>
                            
                            <div class="text-[10px] sm:text-xs text-[#1cb0f6] font-bold mb-2 sm:mb-3 flex items-center bg-blue-50 w-fit px-2 py-1 rounded-lg">
                                <i class="fa-solid fa-hand-pointer mr-2 animate-bounce"></i> Chạm vào từ để nghe
                            </div>
                            
                            <div id="lesson-english" class="text-base sm:text-xl leading-relaxed text-gray-800 font-bold mb-4 flex flex-wrap gap-x-1 gap-y-1">
                                <!-- Render english text with spans -->
                            </div>

                            <!-- Buttons for Audio -->
                            <div class="flex space-x-2 sm:space-x-3 mt-4 pt-4 border-t-2 border-gray-100">
                                <button onclick="speakFull()" class="w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-[#1cb0f6] text-white flex items-center justify-center text-lg sm:text-xl btn-3d shadow-sm hover:brightness-110 active:border-b-0 active:translate-y-[4px]">
                                    <i class="fa-solid fa-volume-high"></i>
                                </button>
                                <button onclick="toggleTranslation()" class="px-4 h-10 sm:h-12 rounded-xl bg-gray-100 text-gray-500 font-bold flex items-center justify-center btn-3d shadow-sm hover:bg-gray-200 text-sm sm:text-base">
                                    <i class="fa-solid fa-language mr-2"></i> Dịch
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Translation Box -->
                    <div id="lesson-vietnamese" class="mt-4 p-4 bg-[#f7f7f7] rounded-xl text-gray-600 text-sm sm:text-base leading-relaxed hidden border-2 border-gray-200">
                    </div>
                </div>

                <!-- VIEW 2: LUYỆN CÂU (Sắp xếp từ) -->
                <div id="view-practice" class="hidden flex-col h-full">
                    <h2 class="text-xl sm:text-2xl font-black text-gray-800 mb-6">Sắp xếp thành câu đúng</h2>
                    
                    <div class="mb-4 text-[#1cb0f6] font-bold text-sm sm:text-base flex items-center">

                    <div id="practice-answer-box" class="min-h-[60px] sm:min-h-[80px] w-full border-b-2 border-gray-300 mb-6 flex flex-wrap gap-2 items-start pb-2">
                        <!-- Lựa chọn sẽ xuất hiện ở đây -->
                    </div>

                    <!-- Kho từ lộn xộn -->
                    <div id="practice-word-bank" class="flex flex-wrap gap-2 justify-center mt-auto pb-4">
                        <!-- Các từ sẽ được render ngẫu nhiên -->
                    </div>
                </div>

            </div>

            <!-- Modal Footer (Nút hoàn thành / Kiểm tra) -->
            <div class="p-4 border-t-2 border-gray-200 bg-white shrink-0">
                <button id="btn-check" onclick="checkPractice()" class="w-full py-3 sm:py-4 rounded-2xl bg-gray-300 text-gray-500 font-black text-base sm:text-lg hidden btn-3d" disabled>
                    KIỂM TRA
                </button>
                <button id="btn-complete" onclick="completeLesson()" class="w-full py-3 sm:py-4 rounded-2xl bg-[#58cc02] text-white font-black text-base sm:text-lg btn-3d hover:brightness-110 active:border-b-0 active:translate-y-[4px]">
                    HOÀN THÀNH BÀI HỌC
                </button>
            </div>
        </div>
    </div>

                // Ưu tiên các giọng hay: Google US, Natural (Edge), Siri
                selectedVoice = voices.find(v => v.name.includes('Google US English')) ||
                                voices.find(v => v.name.includes('Natural') && v.lang.includes('en')) ||
                                voices.find(v => v.lang === 'en-US') || 
                                voices.find(v => v.lang.includes('en'));
            }
        }
        window.speechSynthesis.onvoiceschanged = setupVoices;

        function renderMap() {
            const container = document.getElementById('map-container');
            container.innerHTML = '';
            
            const completedLessons = JSON.parse(localStorage.getItem('b1Completed')) || [];
            
            // Đường uốn lượn zigzag cho map
            const offsets = ['translate-x-0', 'translate-x-6', 'translate-x-12', 'translate-x-6', 'translate-x-0', '-translate-x-6', '-translate-x-12', '-translate-x-6'];

            lessonsData.forEach((lesson, index) => {
                const isCompleted = completedLessons.includes(lesson.id);
                const transformClass = offsets[index % 8];
                
                // Container bọc ngoài cùng chiếm trọn chiều ngang
                const nodeWrapper = document.createElement('div');
                nodeWrapper.className = `flex justify-center mb-8 w-full`;
                
                // Container nhóm Nút tròn + Nhãn tên để cùng di chuyển theo đường zigzag
                const itemGroup = document.createElement('div');
                itemGroup.className = `flex flex-col items-center transform transition-transform ${transformClass}`;
                
                // Tạo nút bấm tròn (Bài học)
                const btn = document.createElement('div');
                btn.className = `lesson-node ${lesson.colorClass} ${isCompleted ? 'node-completed' : ''} shadow-md`;
                btn.innerHTML = `<i class="fa-solid ${lesson.icon}"></i>`;
                btn.onclick = () => openLesson(index);
                
                // Tạo nhãn tên hiển thị Topic
                const titleBadge = document.createElement('div');
                titleBadge.className = `mt-2 px-3 py-1 bg-white rounded-full text-[12px] sm:text-[13px] font-bold text-gray-500 border-2 border-gray-200 shadow-sm whitespace-nowrap`;
                titleBadge.innerText = lesson.title;
                
                // Gắn vào giao diện
                itemGroup.appendChild(btn);
                itemGroup.appendChild(titleBadge);
                nodeWrapper.appendChild(itemGroup);
                container.appendChild(nodeWrapper);
            });
        }

        function openLesson(index) {
            currentLessonIndex = index;
            const lesson = lessonsData[index];
            
            // Render View 1: Đọc & Nghe
            document.getElementById('lesson-title').innerText = lesson.title;
            document.getElementById('lesson-prompts').innerHTML = lesson.prompts;
            document.getElementById('lesson-vietnamese').innerHTML = lesson.vietnamese;
            document.getElementById('lesson-vietnamese').classList.add('hidden');
            
            // Tách từ để click nghe từng từ
            const words = lesson.english.split(' ');
            const englishContainer = document.getElementById('lesson-english');
            englishContainer.innerHTML = '';
            
            words.forEach(word => {
                const span = document.createElement('span');
                span.innerText = word;
                span.className = 'cursor-pointer hover:bg-blue-100 hover:text-blue-600 rounded px-1 transition-colors active:scale-110 active:bg-blue-200';
                span.onclick = () => speakWord(word);
                englishContainer.appendChild(span);
            });

            // Chuẩn bị View 2: Luyện câu
            // Tách đoạn văn thành các câu dựa vào dấu chấm
            practiceSentences = lesson.english.split('.').map(s => s.trim()).filter(s => s.length > 0);
            currentSentenceIndex = 0;
            preparePracticeSentence();

            // Chuyển tab về mặc định
            switchTab('learn');

            // Hiển thị modal
            const modal = document.getElementById('lesson-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('translate-y-full');
            }, 10);
        }

        // --- HÀM CLOSE LESSON MỚI ĐƯỢC THÊM VÀO ĐÂY ---
        function closeLesson() {
            const modal = document.getElementById('lesson-modal');
            
            // Kéo modal xuống dưới
            modal.classList.add('translate-y-full');
            
            // Dừng mọi giọng đọc đang phát
            window.speechSynthesis.cancel();
            
            // Đợi CSS transition chạy xong (300ms) rồi mới set hidden
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function switchTab(tabId) {
            const viewLearn = document.getElementById('view-learn');
            const viewPractice = document.getElementById('view-practice');
            const tabLearnBtn = document.getElementById('tab-learn');
            const tabPracticeBtn = document.getElementById('tab-practice');
            const btnComplete = document.getElementById('btn-complete');
            const btnCheck = document.getElementById('btn-check');

            if(tabId === 'learn') {
                viewLearn.classList.remove('hidden');
                viewPractice.classList.add('hidden');
                viewPractice.classList.remove('flex');
                
                tabLearnBtn.className = "px-4 py-1.5 rounded-lg font-bold text-sm sm:text-base bg-white shadow text-[#1cb0f6] transition-colors";
                tabPracticeBtn.className = "px-4 py-1.5 rounded-lg font-bold text-sm sm:text-base text-gray-400 hover:text-gray-600 transition-colors";
                
                btnComplete.classList.remove('hidden');
                btnCheck.classList.add('hidden');
            } else {
                viewLearn.classList.add('hidden');
                viewPractice.classList.remove('hidden');
                viewPractice.classList.add('flex');

                tabPracticeBtn.className = "px-4 py-1.5 rounded-lg font-bold text-sm sm:text-base bg-white shadow text-[#1cb0f6] transition-colors";
                tabLearnBtn.className = "px-4 py-1.5 rounded-lg font-bold text-sm sm:text-base text-gray-400 hover:text-gray-600 transition-colors";
                
                btnComplete.classList.add('hidden');
                btnCheck.classList.remove('hidden');
            }
        }

        function toggleTranslation() {
            const vnBox = document.getElementById('lesson-vietnamese');
            if(vnBox.classList.contains('hidden')) {
                vnBox.classList.remove('hidden');
            } else {
                vnBox.classList.add('hidden');
            }
        }

        function speakWord(wordText) {
            window.speechSynthesis.cancel();
            const cleanWord = wordText.replace(/[.,;!?]/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanWord);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            if(selectedVoice) utterance.voice = selectedVoice;
            window.speechSynthesis.speak(utterance);
        }

        function speakFull() {
            window.speechSynthesis.cancel();
            const text = lessonsData[currentLessonIndex].english;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85; 
            if(selectedVoice) utterance.voice = selectedVoice;
            window.speechSynthesis.speak(utterance);
        }

        // --- HỆ THỐNG LUYỆN CÂU ---
        function preparePracticeSentence() {
            if (currentSentenceIndex >= practiceSentences.length) {
                document.getElementById('practice-word-bank').innerHTML = `<div class="text-green-500 font-bold text-xl"><i class="fa-solid fa-check-circle"></i> Tuyệt vời! Bạn đã hoàn thành!</div>`;
                document.getElementById('practice-answer-box').innerHTML = '';
                document.getElementById('btn-check').classList.add('hidden');
                document.getElementById('btn-complete').classList.remove('hidden');
                return;
            }

            document.getElementById('practice-progress').innerText = `${currentSentenceIndex + 1}/${practiceSentences.length}`;
            
            const sentence = practiceSentences[currentSentenceIndex];
            // Xóa dấu câu để so sánh dễ dàng hơn
            correctAnswer = sentence.replace(/[.,;!?]/g, ''); 
            
            const words = correctAnswer.split(' ');
            
            // Xáo trộn mảng từ
            shuffledBank = [...words].sort(() => Math.random() - 0.5);
            userAnswerBank = [];

            renderPracticeUI();
        }

        function renderPracticeUI() {
            const answerBox = document.getElementById('practice-answer-box');
            const wordBank = document.getElementById('practice-word-bank');
            const btnCheck = document.getElementById('btn-check');

            answerBox.innerHTML = userAnswerBank.map((wordObj, idx) => `
                <div onclick="removePracticeWord(${idx})" class="px-3 py-1.5 sm:px-4 sm:py-2 bg-white border-2 border-gray-300 rounded-xl font-bold text-gray-700 cursor-pointer shadow-sm hover:bg-gray-50 active:scale-95 transition-transform text-sm sm:text-base">
                    ${wordObj.word}
                </div>
            `).join('');

            wordBank.innerHTML = shuffledBank.map((word, idx) => {
                if (word === null) {
                    return `<div class="px-3 py-1.5 sm:px-4 sm:py-2 bg-gray-100 border-2 border-transparent rounded-xl text-transparent text-sm sm:text-base">_</div>`;
                }
                return `
                    <div onclick="addPracticeWord(${idx})" class="px-3 py-1.5 sm:px-4 sm:py-2 bg-white border-2 border-gray-300 rounded-xl font-bold text-gray-700 cursor-pointer shadow-sm btn-3d active:translate-y-1 active:border-b-0 border-b-4 hover:bg-gray-50 pb-[4px] sm:pb-[6px] text-sm sm:text-base">
                        ${word}
                    </div>
                `;
            }).join('');

            // Bật tắt nút check
            if(userAnswerBank.length > 0) {
                btnCheck.disabled = false;
                btnCheck.className = "w-full py-3 sm:py-4 rounded-2xl bg-[#58cc02] text-white font-black text-base sm:text-lg btn-3d hover:brightness-110 active:border-b-0 active:translate-y-[4px]";
            } else {
                btnCheck.disabled = true;
                btnCheck.className = "w-full py-3 sm:py-4 rounded-2xl bg-gray-300 text-gray-500 font-black text-base sm:text-lg btn-3d cursor-not-allowed";
            }
        }

        function addPracticeWord(idx) {
            if(shuffledBank[idx] === null) return;
            const word = shuffledBank[idx];
            userAnswerBank.push({word: word, originalIdx: idx});
            shuffledBank[idx] = null; // Tạo khoảng trống
            
            // Đọc từ khi bấm chọn
            speakWord(word);
            
            renderPracticeUI();
        }

        function removePracticeWord(userAnswerIdx) {
            const item = userAnswerBank[userAnswerIdx];
            shuffledBank[item.originalIdx] = item.word; // Trả về vị trí cũ
            userAnswerBank.splice(userAnswerIdx, 1);
            renderPracticeUI();
        }

        function checkPractice() {
            const userStr = userAnswerBank.map(item => item.word).join(' ').toLowerCase();
            const correctStr = correctAnswer.toLowerCase();

            if (userStr === correctStr) {
                // ĐÚNG
                const utterance = new SpeechSynthesisUtterance(correctAnswer);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                if(selectedVoice) utterance.voice = selectedVoice;
                window.speechSynthesis.speak(utterance);
                
                // Đổi nút check thành chuyển câu tiếp theo
                const btnCheck = document.getElementById('btn-check');
                btnCheck.innerText = "TIẾP TỤC";
                btnCheck.onclick = () => {
                    currentSentenceIndex++;
                    preparePracticeSentence();
                    btnCheck.innerText = "KIỂM TRA";
                    btnCheck.onclick = checkPractice;
                }
            } else {
                // SAI
                const box = document.getElementById('practice-answer-box');
                box.classList.add('border-red-500', 'bg-red-50');
                // Hiệu ứng rung
                box.style.transform = "translateX(-5px)";
                setTimeout(() => box.style.transform = "translateX(5px)", 100);
                setTimeout(() => box.style.transform = "translateX(-5px)", 200);
                setTimeout(() => box.style.transform = "translateX(0)", 300);
                
                setTimeout(() => {
                    box.classList.remove('border-red-500', 'bg-red-50');
                }, 800);
            }
        }

        function completeLesson() {
            window.speechSynthesis.cancel();
            
            let completed = JSON.parse(localStorage.getItem('b1Completed')) || [];
            const lessonId = lessonsData[currentLessonIndex].id;
            
            if (!completed.includes(lessonId)) {
                completed.push(lessonId);
                localStorage.setItem('b1Completed', JSON.stringify(completed));
            }
            
            closeLesson(); // Đã sử dụng hàm closeLesson mới
            renderMap();
        }

        // Khởi tạo ứng dụng
        window.onload = () => {
            setupVoices();
            renderMap();
        };
    </script>
</body>
</html>
